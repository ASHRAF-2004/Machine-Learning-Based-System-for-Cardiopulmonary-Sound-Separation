<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeoSSNet Results</title>
</head>
<body>
  <h1>Separated Result Lookup</h1>
  <input type="text" id="recordingId" placeholder="Recording ID" />
  <button id="lookupBtn">Load Result</button>
  <pre id="result"></pre>

  <script>
    document.getElementById('lookupBtn').addEventListener('click', async () => {
      const recordingId = document.getElementById('recordingId').value;
      const res = await fetch(`/results/${recordingId}`);
      const text = await res.text();
      try {
        document.getElementById('result').textContent = JSON.stringify(JSON.parse(text), null, 2);
      } catch {
        document.getElementById('result').textContent = text;
      }
    });
  </script>
</body>
</html>
